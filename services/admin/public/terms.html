<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teilnahmebedingungen</title>
<style>
  :root { --cyan:#00d4ff; --bg:#04060a; --panel:#0a0e16; --txt:#c8dce8; --dim:rgba(200,220,232,0.55); --line:rgba(0,212,255,0.18); }
  * { box-sizing:border-box; } body { margin:0; background:var(--bg); color:var(--txt); font-family:system-ui,'Segoe UI',sans-serif; line-height:1.6; }
  .wrap { max-width:760px; margin:0 auto; padding:32px 20px 80px; }
  .doc { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:28px 30px; }
  .doc h1 { font-size:22px; color:var(--cyan); margin:.2em 0 .5em; }
  .doc h2 { font-size:16px; color:var(--cyan); margin:1.4em 0 .4em; border-top:1px solid rgba(255,255,255,.06); padding-top:1em; }
  .doc h3 { font-size:14px; margin:1em 0 .3em; }
  .doc p { margin:.5em 0; } .doc ul { margin:.4em 0 .8em 1.2em; } .doc li { margin:.2em 0; }
  .doc a { color:var(--cyan); } .doc b { color:#e6f4fb; }
  .doc blockquote { border-left:3px solid var(--cyan); margin:.8em 0; padding:.3em 0 .3em 14px; color:var(--dim); background:rgba(0,212,255,0.04); }
  .doc code { background:#060a11; padding:1px 5px; border-radius:4px; font-size:.9em; }
  .meta { color:var(--dim); font-size:13px; margin-bottom:16px; }
  .chips span { display:inline-block; background:rgba(0,212,255,0.1); color:var(--cyan); padding:2px 9px; border-radius:5px; font-size:12px; margin:2px 4px 2px 0; }
  .doc table { border-collapse:collapse; width:100%; margin:.8em 0; font-size:13px; }
  .doc th, .doc td { border:1px solid var(--line); padding:7px 10px; text-align:left; vertical-align:top; }
  .doc th { color:var(--cyan); font-weight:600; background:rgba(0,212,255,0.05); }
  .err { color:#ff5468; }
</style>
</head>
<body>
<div class="wrap">
  <div class="meta" id="meta"></div>
  <div class="doc" id="doc">lädt…</div>
</div>
<script>
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function inline(s){return esc(s).replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');}
  function mdToHtml(md){
    var lines=String(md).split(/\r?\n/), out=[], inList=false, inCode=false;
    function cl(){ if(inList){out.push('</ul>');inList=false;} }
    for(var i=0;i<lines.length;i++){ var l=lines[i];
      if(/^```/.test(l)){ if(inCode){out.push('</pre>');inCode=false;}else{cl();out.push('<pre>');inCode=true;} continue; }
      if(inCode){ out.push(esc(l)); continue; }
      var h=l.match(/^(#{1,4})\s+(.*)/);
      if(h){ cl(); var n=h[1].length; out.push('<h'+n+'>'+inline(h[2])+'</h'+n+'>'); continue; }
      // Markdown-Tabellen: | a | b | mit Trennzeile |---|---|
      if(/^\s*\|.*\|\s*$/.test(l)){
        cl();
        var rows=[];
        while(i<lines.length && /^\s*\|.*\|\s*$/.test(lines[i])){
          var cells=lines[i].trim().replace(/^\||\|$/g,'').split('|').map(function(c){return c.trim();});
          if(!/^[\s:|-]+$/.test(lines[i])) rows.push(cells);   // Trennzeile ueberspringen
          i++;
        }
        i--;
        if(rows.length){
          var head='<tr>'+rows[0].map(function(c){return '<th>'+inline(c)+'</th>';}).join('')+'</tr>';
          var body=rows.slice(1).map(function(r){
            return '<tr>'+r.map(function(c){return '<td>'+inline(c)+'</td>';}).join('')+'</tr>';
          }).join('');
          out.push('<table>'+head+body+'</table>');
        }
        continue;
      }
      if(/^\s*[-*]\s+/.test(l)){ if(!inList){out.push('<ul>');inList=true;} out.push('<li>'+inline(l.replace(/^\s*[-*]\s+/,''))+'</li>'); continue; }
      if(/^\s*>\s?/.test(l)){ cl(); out.push('<blockquote>'+inline(l.replace(/^\s*>\s?/,''))+'</blockquote>'); continue; }
      if(/^\s*$/.test(l)){ cl(); continue; }
      cl(); out.push('<p>'+inline(l)+'</p>');
    }
    cl(); if(inCode)out.push('</pre>'); return out.join('\n');
  }
  // Aenderungshistorie: Teilnehmer sollen sehen, wann sich was geaendert hat,
  // ohne die Fassungen selbst vergleichen zu muessen.
  function historyHtml(hist) {
    if (!hist || !hist.length) return '';
    var rows = hist.map(function(h) {
      var when = new Date(h.created_at).toLocaleString('de-DE');
      var secs = (h.sections || []).map(function(x) {
        return esc(x.section) + ' (' + esc(x.kind) + ')';
      }).join(', ');
      return '<li style="margin-bottom:8px">'
           + '<b>Fassung ' + esc(String(h.version)) + '</b> · ' + esc(when)
           + (h.note ? '<br><span style="opacity:.85">' + esc(h.note) + '</span>' : '')
           + (secs ? '<br><span style="opacity:.6;font-size:12px">Betroffen: ' + secs + '</span>' : '')
           + '</li>';
    }).join('');
    return '<h2 style="margin-top:32px">Änderungsverlauf</h2>'
         + '<p style="opacity:.7;font-size:13px">Jede Änderung dieser Bedingungen wird mit Zeitpunkt '
         + 'und betroffenen Abschnitten festgehalten.</p><ul>' + rows + '</ul>';
  }

  // Impressum des Veranstalters - Text oder Link, eines von beidem ist Pflicht.
  function organizerHtml(d) {
    var inner;
    if (d.imprint && d.imprint.trim()) inner = mdToHtml(d.imprint);
    else if (d.imprintUrl) inner = '<p><a href="' + esc(d.imprintUrl) + '" target="_blank" rel="noopener noreferrer">'
                                 + esc(d.imprintUrl) + '</a></p>';
    else inner = '<p class="err">Der Veranstalter hat noch kein Impressum hinterlegt.</p>';
    return '<h2 style="margin-top:32px">Impressum des Veranstalters</h2>' + inner;
  }

  var team = new URLSearchParams(location.search).get('team') || '';
  var doc = document.getElementById('doc'), meta = document.getElementById('meta');
  if (!team) { doc.innerHTML = '<span class="err">Kein Team angegeben (?team=…).</span>'; }
  else fetch('/admin/pub/team/' + encodeURIComponent(team)).then(function(r){return r.json();}).then(function(d){
    if (d.error) { doc.innerHTML = '<span class="err">Team nicht gefunden.</span>'; return; }
    document.title = 'Teilnahmebedingungen · ' + d.name;
    var chips = (d.channels||[]).map(function(c){return '<span>'+esc(c)+'</span>';}).join('');
    var stand = d.updatedAt
      ? 'Stand: ' + new Date(d.updatedAt).toLocaleString('de-DE') + ' · Fassung ' + d.version
      : 'Stand: unveraendert seit Einrichtung';
    meta.innerHTML = '<b style="color:#e6f4fb;font-size:15px">' + esc(d.name) + '</b><div class="chips" style="margin-top:6px">' + chips + '</div>'
      + '<div style="margin-top:8px;font-size:12px;color:#8fb6cc">' + esc(stand) + '</div>'
      + (d.isDefault ? '<div style="margin-top:4px;font-size:12px;opacity:.5">Standard-Vorlage</div>' : '');
    doc.innerHTML = mdToHtml(d.terms) + historyHtml(d.history)
      + '<hr style="margin:28px 0;border:0;border-top:1px solid rgba(0,212,255,0.18)">'
      + organizerHtml(d)
      + '<p style="font-size:12px;opacity:.7">Veranstalter dieses Gewinnspiels ist <b>' + esc(d.name) + '</b>, nicht der Betreiber dieser Plattform. Ansprüche aus der Teilnahme bestehen ausschließlich gegenüber dem Veranstalter. <a href="/admin/impressum.html">Impressum</a> &middot; <a href="/admin/datenschutz.html">Datenschutz</a> der Plattform.</p>';
  }).catch(function(){ doc.innerHTML = '<span class="err">Ladefehler.</span>'; });
</script>
</body>
</html>
