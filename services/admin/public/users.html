<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Team Giveaway – Benutzerverwaltung</title>
<link rel="stylesheet" href="chaos-crew-admin.css">
<style>
  .userwrap { max-width:820px; margin:24px auto; padding:0 16px; }
  .panel { background:#0a0e16; border:1px solid rgba(0,212,255,0.2); border-radius:8px; padding:20px; margin-bottom:20px; }
  .panel h2 { font-size:13px; letter-spacing:2px; color:#00d4ff; margin-bottom:14px; text-transform:uppercase; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { text-align:left; padding:9px 8px; border-bottom:1px solid rgba(255,255,255,0.06); }
  th { color:rgba(200,220,232,0.5); font-size:11px; letter-spacing:1px; text-transform:uppercase; }
  .role { font-family:'Share Tech Mono',monospace; font-size:11px; padding:2px 7px; border-radius:4px; background:rgba(0,212,255,0.12); color:#00d4ff; }
  .role.superadmin { background:rgba(240,165,0,0.15); color:#f0a500; }
  .row-form { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; }
  .row-form .fld { display:flex; flex-direction:column; gap:5px; }
  .row-form label { font-size:11px; letter-spacing:1px; color:rgba(200,220,232,0.5); text-transform:uppercase; }
  input, select { background:#060a11; border:1px solid rgba(0,212,255,0.25); color:#c8dce8; padding:9px 10px; border-radius:6px; font-size:13px; outline:none; }
  button { background:#00d4ff; color:#02121a; border:none; padding:9px 16px; border-radius:6px; font-weight:700; cursor:pointer; letter-spacing:.5px; }
  button.danger { background:transparent; border:1px solid #ff5468; color:#ff5468; padding:5px 11px; font-size:12px; }
  .msg { margin-top:12px; font-size:12px; min-height:15px; }
  .msg.ok { color:#4ee39a; } .msg.err { color:#ff5468; }
</style>
</head>
<body>
<script src="admin-shared.js"></script>
<div class="userwrap">

  <div class="panel">
    <h2>Benutzer anlegen / aktualisieren</h2>
    <form class="row-form" id="addForm">
      <div class="fld"><label>Benutzername</label><input id="nu" required></div>
      <div class="fld"><label>Passwort (min. 8)</label><input id="np" type="password" required></div>
      <div class="fld"><label>Rolle</label>
        <select id="nr">
          <option value="admin">admin</option>
          <option value="superadmin">superadmin</option>
        </select>
      </div>
      <button type="submit">Speichern</button>
    </form>
    <div class="msg" id="addMsg"></div>
  </div>

  <div class="panel">
    <h2>Benutzer</h2>
    <table>
      <thead><tr><th>Benutzer</th><th>Rolle</th><th>Erstellt</th><th>Letzter Login</th><th></th></tr></thead>
      <tbody id="rows"><tr><td colspan="5" style="color:rgba(200,220,232,0.4)">lädt…</td></tr></tbody>
    </table>
    <div class="msg" id="listMsg"></div>
  </div>

</div>
<script src="users.js"></script>
</body>
</html>
